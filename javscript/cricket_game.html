<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #main{
            background-color: #ffe0e0;
            width: 40vw;
            height: 40vh;
            margin: 20vh auto; 
            padding: 20px;
        }
        #buttons {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            width: 100px;
            height: 40px;
            background-color: #af4c4c;
            cursor: pointer;
        }   
        #main h3 {
            font-size: 20px;
            font-weight: bold;
            height: 5vh;
        }
        p{
            font-size: 20px;
            font-weight: bold;
            background-color: #f25656;
            color: white;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            width: 20vw;
            
        }
        #main button#reset {
            font-size: 20px;
            font-weight: bold;
            background-color: #f25656;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            width: 20vw;
            border: none;
            margin-top: 2vh;
        }
    </style>
</head>
<body>

    <div id="main">
        <h1>Cricket Game</h1>
        <div id="buttons">
            <button id="bat" onclick="playGame('bat')">Bat</button>
            <button id="ball" onclick="playGame('ball')">Ball</button>
            <button id="stump" onclick="playGame('stump')">Stump</button>
        </div>
        <h3 id="result"></h3>
        <p>Score: <span id="score">0</span></p>
        <button id="reset" onclick="resetScore()">Reset Score</button>
    </div>

    <script>
        let userChoice;
        let computerChoice;
        let resultmes;
        let scoreStr=localStorage.getItem('score');
        let score=(JSON.parse(scoreStr) || {win: 0, lose:0, ties: 0});
        // if(scoreStr!=undefined)
        // {
        //     score=JSON.parse(scoreStr);
        // }
        // else
        // {
        //     score={
        //         win: 0,
        //         lose: 0,    
        //         ties: 0,
                
        //         };
        // }
        
        function Showscore() {
            localStorage.setItem('score', JSON.stringify(score));
            return `Win: ${score.win}, Lose: ${score.lose}, Ties: ${score.ties}`;
        }
        document.getElementById('score').innerText = Showscore();

        function playGame(userChoice) {
            console.log(`You chose ${userChoice}`);
            let randomNumber = Math.round(Math.random() * 2);
            if (randomNumber == 0) {
                computerChoice = 'bat';
                console.log('Computer chose bat');
            } else if (randomNumber == 1) {
                computerChoice = 'ball';
                console.log('Computer chose ball');
            } else {
                computerChoice = 'stump';
                console.log('Computer chose stump');
            }

            if (userChoice === computerChoice) {
                resultmes = 'Draw';
                score.ties++;
            } else if (
                (userChoice === 'bat' && computerChoice === 'ball') ||
                (userChoice === 'ball' && computerChoice === 'stump') ||
                (userChoice === 'stump' && computerChoice === 'bat')
            ) {
                resultmes = 'You Win';
                score.win++;
            } else {
                resultmes = 'You Lose';
                score.lose++;
            }

            document.getElementById('result').innerText = `Computer chose ${computerChoice}\n${resultmes}`;
            document.getElementById('score').innerText = Showscore();
        }
        function resetScore(){
            localStorage.clear();
            score={
                win: 0,
                lose: 0,    
                ties: 0,
                
                };
            document.getElementById('score').innerText = Showscore();
        }
    </script>
</body>
</html>
