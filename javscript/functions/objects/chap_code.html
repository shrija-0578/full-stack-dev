<!DOCTYPE html>
<html lang="en">
<head>
    <title>objects</title>
</head>
<body>
    <script>
        let product={
            name:'laptop',
            price:50000,
            brand:'hp',
            color:'black',
            // defining a method inside an object
            getDetails:function()
            {
                return `${this.name}--${this.price}--${this.brand}--${this.color}`;
            }
        }
         
        // console.log(product.name);
        // console.log(product.price);
        // console.log(product.brand);
        // console.log(product.color); 
        console.log(product['name']);
        console.log(product['price']);  
        console.log(product.getDetails());
    
    </script>
    
</body>
</html>
