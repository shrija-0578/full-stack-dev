<!DOCTYPE html>
<html lang="en">
<head>
    <title>Function Examples</title>
</head>
<body>
    <script>
        let number;
        number=prompt('Enter a number');
        checkevodd(number);
        function checkevodd(num)
        {
            if(num%2==0)
        {
            console.log(`${num} is even`);
        }
        else
        {
            console.log(`${num} is odd`);
        }
        }
    </script>
</body>
</html>
