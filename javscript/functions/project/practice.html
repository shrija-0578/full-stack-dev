<!DOCTYPE html>
<html lang="en">
<head>
    <title>practice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #09200c;
        }  

        #main{
            background-color: #d5eedf;
            display: flex;
            flex-direction: column;
            width: 50vw;
            margin: 5vh auto; 
            padding: 20px;
            border-radius: 2vh;
        }
        .container {
            background-color: #38ffa5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            width: 30vw;
            height: 40vh;
            margin: 5vh auto; 
            padding: 20px;
        }
        .container input {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            width: 200px;
            border-radius: 5px;
            border: 1px solid #1c2d06;
        }
        .container button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            background-color: #1c2d06;
            color: white;
            cursor: pointer;
        }
        .container h3 {
            margin-top: 20px;
            font-size: 18px;
            color: #1c2d06;
        }

    </style>
</head>
<body>
    <div id="main"> 
        <div class="container">
            <h1>Even or Odd</h1>
            <input type="number" id="numberInput" placeholder="Enter a number">
            <button id="checkButton" onclick="checkEvenOrOdd()">Check</button>
            <h3 id="evodresult"></h3>
        </div>

    <div class="container">
            <h1>Check Larger</h1>
            <input type="number" id="num1Input" placeholder="Enter first number">
            <input type="number" id="num2Input" placeholder="Enter second number">
            <button id="checkLarger" onclick="checkLarger()">Check</button>
            <h3 id="largerResult"></h3>
        </div>

    <div class="container">
            <h1>Celsius to Fahrenheit</h1>
            <input type="number" id="celsiusInput" placeholder="Enter temperature in Celsius">
            <button id="convertButton" onclick="convertCelsiusToFahrenheit()  ">Convert</button>
            <h3 id="fahrenheitResult"></h3>
        </div>

    </div>


    <script>
            function checkEvenOrOdd() {
                let num = Number(document.getElementById("numberInput").value);
                if (num % 2 === 0) {
                    document.getElementById('evodresult').innerText = `${num} is even`;
                } else {
                    document.getElementById('evodresult').innerText = `${num} is odd`;
                }
            }
            
            function checkLarger() {
                let num1 = Number(document.getElementById("num1Input").value);
                let num2 = Number(document.getElementById("num2Input").value);
                if (num1 > num2) {
                    document.getElementById('largerResult').innerText = `${num1} is larger than ${num2}`;
                } else if (num2 > num1) {
                    document.getElementById('largerResult').innerText = `${num2} is larger than ${num1}`;
                } else {
                    document.getElementById('largerResult').innerText = `${num1} and ${num2} are equal`;
                }
            }

            function convertCelsiusToFahrenheit() {
                let celsius = Number(document.getElementById("celsiusInput").value);
                let fahrenheit = (celsius * 9/5) + 32;
                document.getElementById('fahrenheitResult').innerText = `${celsius}°C is equal to ${fahrenheit.toFixed(2)}°F`;
            }

    </script>

</body>
</html>
