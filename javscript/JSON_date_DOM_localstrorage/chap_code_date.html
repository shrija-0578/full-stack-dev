<!DOCTYPE html>
<html lang="en">
<head>
    <title>date</title>
</head>
<body>
    <script>
        let date=new Date();
        console.log(date);
        console.log(date.toDateString());
        console.log(date.toTimeString());   
        console.log(date.getDate());
        console.log(date.getDay());
        console.log(date.getMonth());   
    </script>
</body>
</html>
